
#бушлат следователя
- type: entity
  parent: ClothingOuterStorageBase
  id: ADTClothingOuterCoatInvestigator
  name: investigator coat #changed name
  description: This jacket increases the chance of a suspect's confession by half. #removed one word from the description
  components:
  - type: Sprite
    sprite: ADT/Clothing/OuterClothing/Coats/investigator_coat.rsi
  - type: Clothing
    sprite: ADT/Clothing/OuterClothing/Coats/investigator_coat.rsi
  - type: StorageFill
    contents:
    - id: SmokingPipeFilledTobacco
    - id: FlippoEngravedLighter
  - type: ExplosionResistance
    damageCoefficient: 1 #its a coat. it doesnt do shit
  - type: Armor # Woundmed
    coverage:
    - Chest
    - Groin
    - Tail
    - Arm
    - Leg
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.65
        Heat: 0.7

