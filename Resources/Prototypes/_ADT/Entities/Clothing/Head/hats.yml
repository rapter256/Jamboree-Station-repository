- type: entity
  parent: [ClothingHeadBase, BaseFoldable, BaseSecurityContraband]
  id: ADTClothingHeadHelmetSecUshanka
  name: security ushanka #changed name
  description: The perfect hat for upholding the Legal Mandate with your comrades. #changed description
  components:
  - type: Clothing
    sprite: ADT/Clothing/Head/Helmets/secushanka.rsi
  - type: Appearance
  - type: AddAccentClothing
    accent: RussianAccent
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: up
    foldedHeldPrefix: up
  - type: Sprite
    sprite: ADT/Clothing/Head/Helmets/secushanka.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-up
      map: ["foldedLayer"]
      visible: false
  - type: TemperatureProtection
    heatingCoefficient: 1.025
    coolingCoefficient: 0.5
  - type: Armor #Values seem to let the user survive one extra hit if attacked consistently.
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.8

- type: entity
  name: drinking helmet #changed name
  parent: ClothingHeadBase
  id: ADTClothingHeadDrinkCap
  description: A red cap with cans attached to the sides, from which a straw extends. The label on the cans has been erased, but you can read the composition - “contains one hundred times the daily allowance of sugar” and “now contains 33% MORE PURE radiation”.
  components:
  - type: Sprite
    sprite: ADT/Clothing/Head/Hats/drink_cap.rsi
  - type: Clothing
    sprite: ADT/Clothing/Head/Hats/drink_cap.rsi
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30 #changed from 60 to 30, so that it can be less so used for combat things
  - type: MixableSolution
    solution: drink
  - type: SolutionTransfer
    canChangeTransferAmount: true
    maxTransferAmount: 15
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: DrawableSolution
    solution: drink
  - type: RefillableSolution
    solution: drink
  - type: DrainableSolution
    solution: drink
  - type: Spillable
    solution: drink
  - type: DnaSubstanceTrace
  - type: Drink #added

