#Фуражка следователя
- type: entity
  parent: [ClothingHeadBase, BaseSecurityContraband]
  id: ADTClothingHeadHatsInvestigatorCap
  name: investigator cap
  description: This cap shows that when it comes to mysterys, you are the highest authority. #changed description to be less generic
  components:
  - type: Tag
    tags: # ignore "WhitelistChameleon" tag
      - WhitelistChameleon
  - type: Sprite
    sprite: ADT/Clothing/Head/Hats/investigator_cap.rsi
  - type: Clothing
    sprite: ADT/Clothing/Head/Hats/investigator_cap.rsi
  - type: Armor # Goob
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8

