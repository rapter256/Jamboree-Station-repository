          Botanist: [ 2, 3 ]
          Boxer: [ 1, 2 ]
          Chaplain: [ 1, 1 ]
          Chef: [ 2, 3 ]
          Clown: [ 1, 2 ]
          Lawyer: [ 2, 2 ]
          Librarian: [ 1, 1 ]
          Reporter: [ 2, 2 ]
          Musician: [ 1, 2 ]
          ServiceWorker: [ 2, 3 ]
          Janitor: [ 2, 2 ]
          Mime: [ 1, 2 ]
