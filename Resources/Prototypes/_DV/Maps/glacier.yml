        #science
          ResearchDirector: [ 1, 1 ]
          Roboticist: [ 1, 2 ]
          Scientist: [ 2, 3 ]
          ResearchAssistant: [ 2, 2 ]
          Borg: [ 2, 3 ]
        #security
