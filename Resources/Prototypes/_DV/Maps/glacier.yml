        #engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 1, 2 ]
          StationEngineer: [ 2, 3 ]
          TechnicalAssistant: [ 2, 2 ]
        #medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 1, 2 ]
          Paramedic: [ 1, 2 ]
