- type: entity
  name: cmo's medical beam gun
  parent: [ BaseItem, BaseCommandContraband ]
  description: An older but ornate version of the standard medical beam gun. This "quick fix" will need to recharge itself periodically in it's matching backpack.
  suffix: Battery
  id: CMOMedicalBeamGun
  components:
  - type: Sprite
    sprite: _Jamboree/Objects/Specific/Medical/cmomedigun.rsi
    layers:
    - state: icon
    - state: active_gun
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: Item
    sprite: _Jamboree/Objects/Specific/Medical/cmomedigun.rsi
    size: Large
  - type: MediGun
    healing: # cmd selector fixes - values were -2
      types:
        Blunt: -1
        Slash: -1
        Piercing: -1
        Heat: -1
    uberHealing: # cmd selector fixes - values were -4
      types:
        Blunt: -3
        Slash: -3
        Piercing: -3
        Heat: -3
    soundOnTarget:
      path: /Audio/_Goobstation/Weapons/Effects/energy_reload.ogg
      params:
        volume: 6
    healAbleWhitelist:
      requireAll: true
      components:
      - Damageable
      - MobState
      - Respirator # cmd selector fixes - medigun will not heal silicons
  - type: ItemToggle
    predictable: false
    soundActivate:
      path: /Audio/_Goobstation/Weapons/Effects/energy_alarm.ogg
      params:
        volume: 6
    soundDeactivate:
      path: /Audio/_Goobstation/Weapons/Effects/energy_error.ogg
      params:
        volume: 6
    soundFailToActivate:
      path: /Audio/_Goobstation/Weapons/Effects/energy_error.ogg
      params:
        volume: 6
  - type: UseDelay
    delay: 1.0
  - type: Battery
    maxCharge: 35 # Jamboree - up from 20 because it's the CMO's cool one, exchanged for less healing
    startingCharge: 35
  - type: RechargeableBlocking
    chargedRechargeRate: 0
    dischargedRechargeRate: 1
  - type: StealTarget # Jamboree - cmd/steal gear tweak
    stealGroup: CMO
  # Visuals
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true}
          False: { visible: false}
