# Captain

- type: entity
  id: CaptainUndeterminedWeapon
  name: captain sets pack
  description: A small box utilizing bluespace technology to drop in a loadout directly to you. Choose wisely.
  parent: [ BaseItem, BaseSetSelector, BaseCommandContraband]
  components:
  - type: Sprite
    sprite: _Jamboree/Objects/Specific/Command/captainundetermined.rsi
    state: icon
  - type: SetSelector
    possibleSets:
    - AntiqueLaserSet
    - CaneBladeSet
    - CapPirateSet
#    - CapSupportSet # TODO - finish this
    maxSelectedSets: 1

