- type: entity
  parent: [ BaseItem, BaseCommandContraband ]
  id: HandheldHolopad
  name: handheld holopad
  description: The Head of Personnel's special holopad. It will drop a holographic figure of whoever you are speaking with on the ground next to it when you pick up a call.
  components:
  - type: Sprite
    sprite: _Jamboree/Objects/Devices/handheldholopad.rsi
    layers:
    - state: icon
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.TelephoneVisuals.Key:
        lights:
          Idle: { state: blank }
          Calling: { state: lights_calling }
          Ringing: { state: lights_ringing }
          InCall: { state: lights_in_call }
          EndingCall: { state: lights_hanging_up }
  - type: PointLight
    radius: 1.3
    energy: 1.8
    color: "#afe1fe"
    enabled: false
  - type: AmbientSound
    enabled: false
    volume: -5
    range: 3
    sound:
      path: /Audio/Ambience/Objects/buzzing.ogg
  - type: Holopad
    hologramProtoId: HolopadHologram
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    speechBubbleOffset: 0.45
  - type: Telephone
    ringTone: /Audio/Machines/double_ring.ogg
    listeningRange: 2.5
    speakerVolume: Speak
  - type: AccessReader
    access: [[ "Command" ]]
  - type: ActivatableUI
    key: enum.HolopadUiKey.InteractionWindow
  - type: UserInterface
    interfaces:
      enum.HolopadUiKey.InteractionWindow:
        type: HolopadBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
