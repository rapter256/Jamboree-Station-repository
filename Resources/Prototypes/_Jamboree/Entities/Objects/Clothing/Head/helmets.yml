- type: entity
  parent: [ClothingHeadBase, BaseSecurityContraband]
  id: ClothingHeadHatWardenArmor
  name: warden's plate helmet
  description: You can barely see in or out of this.
  components:
  - type: Sprite
    sprite: _Jamboree/Clothing/Head/Armor/wardenarmorhelmet.rsi
    state: icon
  - type: Clothing
    sprite: _Jamboree/Clothing/Head/Armor/wardenarmorhelmet.rsi
  - type: Armor
    coverage:
    - Head
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.4
        Piercing: 0.8
        Caustic: 0.7
        Heat: 0.8
  - type: Tag
    tags:
    - HidesHair
  - type: FireProtection
    reduction: 0.2
  - type: HideLayerClothing
    layers:
      Hair: HEAD
      HeadTop: HEAD
      HeadSide: HEAD

- type: entity
  parent: [ ClothingHeadHardsuitBase, BaseCommandContraband ]
  id: ClothingHeadHelmetHardsuitBroker
  name: stock broker hardsuit helmet
  categories: [ HideSpawnMenu ]
  description: The inside is made of a delicate velvet.
  components:
  - type: Sprite
    sprite: _Jamboree/Clothing/Head/Hardsuits/QMBrokerHelmet.rsi
  - type: Clothing
    sprite: _Jamboree/Clothing/Head/Hardsuits/QMBrokerHelmet.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Radiation: 0.1
        Caustic: 0.7

