- type: entity
  parent: [ClothingHeadBase, BaseFoldable, BaseSecurityCommandContraband]
  id: ClothingHeadHatUshankaHOS
  name: head of security's armored ushanka
  description: This hat was made of bear hands. That bear was killed by bare hands. #TF2 Reference wherever I CAN!!!!!!! (bibble, jamboree)
  components:
  - type: Clothing
    sprite: _Jamboree/Clothing/Head/Hats/hos_ushanka.rsi
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: up
    foldedHeldPrefix: up
  - type: Sprite
    sprite: _Jamboree/Clothing/Head/Hats/hos_ushanka.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-up
      map: ["foldedLayer"]
      visible: false
  - type: Armor
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.8