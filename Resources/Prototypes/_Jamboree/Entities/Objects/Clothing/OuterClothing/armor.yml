- type: entity
  parent: [ ClothingOuterBaseMedium, AllowSuitStorageClothing, BaseSecurityContraband ]
  id: ClothingOuterArmorWardenGuard
  name: warden's plate armor
  description: Halt naysayer, perceive my drip!
  components:
  - type: Sprite
    sprite: _Jamboree/Clothing/OuterClothing/Armor/wardenarmor.rsi #jamboree, moved to Armor folder to keep organized
  - type: Clothing
    sprite: _Jamboree/Clothing/OuterClothing/Armor/wardenarmor.rsi #jamboree, moved to Armor folder to keep organized
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Tail
    - Hand
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.4
        Piercing: 0.5
        Heat: 0.8
        Caustic: 0.7
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: FireProtection
    reduction: 0.7

