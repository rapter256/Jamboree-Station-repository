# Real
- type: entity
  parent: ClothingOuterArmorBasic
  id: ClothingOuterWingsOwlReal
  name: owl's wings
  suffix: Real
  description: Guard it all!
  components:
  - type: Sprite
    sprite: _Jamboree/Clothing//SuperSuit/OuterClothing/owl_wings.rsi
  - type: Clothing
    sprite: _Jamboree/Clothing//SuperSuit/OuterClothing/owl_wings.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Tail
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.55
        Heat: 0.7
  - type: PressureProtection
    highPressureMultiplier: 0.6
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01 # Not complete protection from fire
    coolingCoefficient: 0.01
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 2
    knockdownTimeDelta: -2
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.7
  - type: Reflect
    reflectProb: 0.3
    reflects:
    - Energy

