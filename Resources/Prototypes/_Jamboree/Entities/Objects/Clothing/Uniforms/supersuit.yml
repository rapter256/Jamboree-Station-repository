# Real
- type: entity
  parent: ClothingUniformBase
  id: ClothingUniformSuitOwlReal
  name: owl's super suit
  suffix: Real
  description: All it takes is one person to do some good in the world!
  components:
  - type: Sprite
    sprite: _Jamboree/Clothing/SuperSuit/Uniform/owl_suit.rsi
  - type: Clothing
    sprite: _Jamboree/Clothing/SuperSuit/Uniform/owl_suit.rsi
  - type: IgniteFromGasImmunity # EE Plasmeme Change
    parts:
    - Chest
    - Groin
    - LeftArm
    - RightArm
    - LeftLeg
    - RightLeg
    - LeftFoot
    - RightFoot

- type: entity
