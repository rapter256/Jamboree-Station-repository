  - type: Clothing
    sprite: _Jamboree/Clothing/SuperSuit/Uniform/griffin_suit.rsi
  - type: IgniteFromGasImmunity # EE Plasmeme Change
    parts:
    - Chest
    - Groin
    - LeftArm
    - RightArm
    - LeftLeg
    - RightLeg
    - LeftFoot
    - RightFoot

