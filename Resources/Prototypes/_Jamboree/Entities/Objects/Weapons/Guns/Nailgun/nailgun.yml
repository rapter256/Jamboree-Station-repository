- type: entity
  name: industrial nail gun
  parent: [ BaseItem, BaseCommandContraband ]
  id: IndustrialNailgun
  description: An overclocked nailgun, capable of a faster firerate and higher nail velocity.
  components:
  - type: Sprite
    sprite: _Jamboree/Objects/Weapons/Guns/Nailgun/CEnailgun.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: icon
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Normal
  - type: Clothing
    sprite: _Jamboree/Objects/Weapons/Guns/Nailgun/CEnailgun.rsi
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    projectileSpeed: 45
    fireRate: 7
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Goobstation/Weapons/Guns/Gunshots/nailgun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineNailgun
        priority: 1
        whitelist:
          tags:
          - MagazineNailgun
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/hpistol_magout.ogg
  - type: Tag
    tags:
    - Nailgun
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: MagazineAmmoProvider
  - type: Appearance
  - type: StaticPrice
    price: 250
