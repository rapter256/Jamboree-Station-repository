# Owl, Jamboree
- type: entity
  parent: BaseKnife
  id: OwlThrowingStar
  name: owl's throwing star
  description: An ancient weapon repurposed and reinforced by a legendary super hero. Seeing one of these means that if trouble is afoot, you know a savior is about.
  components:
  - type: Tag
    tags:
    - CombatKnife
    - Knife
  - type: Sprite
    sprite: _Jamboree/Objects/Weapons/Throwable/owl_star.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 2
    damage:
      types:
        Slash: 5
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    ignoreResistances: true
    damage:
      types:
        Slash: 10
        Piercing: 15
  - type: Item
    sprite: _Jamboree/Objects/Weapons/Throwable/owl_star.rsi
  - type: ThrowingAngle
    angle: 225
  - type: StaticPrice
    price: 500 # 2000 for a set of 4
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          radius: 0.01
          vertices:
          - -0.475,-0.225
          - -0.225,-0.475
          - 0.525,0.275
          - 0.275,0.525
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2

