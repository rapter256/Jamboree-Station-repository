- type: entity
  id: MREFab
  parent: [BaseLathe, BaseCommandContraband]
  name: MRE fabricator
  description: Prints MREs using biomass. Nanotrasen is not responsible for any harm resulting from the ingestion of said produced MRE.
  components:
  - type: Sprite
    sprite: _Jamboree/Structures/Machines/mrefab.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: MREFabMachineBoard
  - type: MaterialStorage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    staticPacks:
    - MREStatic
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
